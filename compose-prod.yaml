services:
  express-web:
    container_name: express-web
    hostname: express-web
    restart: always
    build: 
      context: ./web/.
      dockerfile: prod.Dockerfile
    environment:
      WEB_PORT: ${WEB_PORT}
      API_PORT: ${API_PORT}
      API_PUBLIC_HOSTNAME: ${API_PUBLIC_HOSTNAME} 
      API_HOSTNAME: ${API_HOSTNAME}
      API_LOCATION: "localhost:4200"  # depracate this
      ENVIRONMENT: "prod"
    ports: 
      - ${WEB_PORT}:${WEB_PORT}
    depends_on:
      - express-api
    # volumes:
    #   - ./web/:/app/web
    #   - /app/web/node_modules
    networks:
      - api-network

  express-api:
    container_name: express-api
    hostname: ${API_HOSTNAME}
    restart: always
    build: 
      context: ./api/.
      dockerfile: prod.Dockerfile
    environment: 
      API_PUBLIC_HOSTNAME: ${API_PUBLIC_HOSTNAME}  # typically the ip or domain name. Set to localhost for local deployment
      API_HOSTNAME: ${API_HOSTNAME}
      API_PORT: ${API_PORT}
      # mongo stuff
      MONGO_ROOT_USER: ${MONGO_ROOT_USER}
      MONGO_ROOT_PASS: ${MONGO_ROOT_PASS}
      APP_USER: ${APP_USER}
      APP_PASS: ${APP_PASS}
      APP_DB: ${APP_DB}
      MONGO_HOSTNAME: ${MONGO_HOSTNAME}
      MONGO_ATLAS_HOST: ${MONGO_ATLAS_HOST}
      MONGO_ATLAS_PASS: ${MONGO_ATLAS_PASS}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      TZ: "Asia/Manila"
      ENVIRONMENT: "prod"
    ports: 
      - ${API_PORT}:${API_PORT}
    volumes:
      - ./api/:/app/api
      - ./data/media:/app/data/media
      - /app/api/node_modules
    networks:
      - api-network
      - mongo-network

  mongodb:
    image: mongo:8.0
    container_name: mongodb
    hostname: ${MONGO_HOSTNAME}
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS}
      MONGO_INITDB_DATABASE: ${MONGO_ROOT_DB}
      MONGO_ROOT_USER: ${MONGO_ROOT_USER}
      MONGO_ROOT_PASS: ${MONGO_ROOT_PASS}
      APP_USER: ${APP_USER}
      APP_PASS: ${APP_PASS}
      APP_DB: ${APP_DB}
      TZ: "Asia/Manila"
      ENVIRONMENT: "prod"
    ports:
      - ${MONGO_PORT}:${MONGO_PORT}
    volumes:
      - mongo-data:/data/db
      - ./scripts/docker:/docker-entrypoint-initdb.d
    networks:
      - mongo-network

volumes:
  mongo-data:

networks:
  mongo-network:
  api-network:
